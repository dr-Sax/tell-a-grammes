<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tangram">
<title>Tangram Tracker</title>
<link rel="stylesheet" href="styles.css">
<script type="module" src="js/main.js?v=5"></script>
</head>
<body>
<div id="app">
  <h1>Tell-a-grammes</h1>

  <div id="canvasWrap">
    <canvas id="mainCanvas"></canvas>
    <canvas id="stereoCanvas"></canvas>
    <div id="tapHint"></div>
    <div id="crosshair"></div>
    <p id="status"></p>
    <button id="exitFs">✕ exit</button>
    <button id="panelToggle">☰ controls</button>

    <!-- Overlay panel: calibration, media, and sliders — lives inside
         canvasWrap so it stays reachable in immersive/fullscreen mode too
         (the immersive CSS rule only hides things OUTSIDE canvasWrap, the
         same trick #exitFs already relied on). Collapses out of the way via
         panelToggle so it doesn't permanently block the camera view. -->
    <div id="overlayPanel">
      <div id="overlayHandle"></div>
      <div id="overlayScroll">
        <!-- populated by ui.js's wireSliders() from config.js's TOL_SLIDERS —
             keeps min/max/step/default in one place instead of duplicated here -->
        <div id="controls"></div>
        <div id="calControls" style="display:none; gap:6px; padding:4px 0; flex-wrap:wrap;">
          <button id="saveBtn" style="font-size:12px; padding:5px 12px;">💾 save config</button>
          <button id="loadBtn" style="font-size:12px; padding:5px 12px;">📂 load config</button>
          <button id="clearAllBtn" style="font-size:12px; padding:5px 12px; opacity:0.6;">✕ clear all</button>
          <button id="fsBtn">⛶ fullscreen</button>
          <button id="stereoBtn">👓 stereo</button>
          <button id="feedBtn">📷 feed on</button>
          <input type="file" id="loadFile" accept=".json" style="display:none">
          <span id="calName" style="font-size:11px; color:#555; align-self:center;"></span>
        </div>

        <div id="debugBar"></div>
        <div id="ui"></div>
      </div>
    </div>
  </div>

  <p id="cvStatus">No external libraries — ready when you are.</p>
  <button id="startBtn">Start camera</button>
</div>
</body>
</html>
